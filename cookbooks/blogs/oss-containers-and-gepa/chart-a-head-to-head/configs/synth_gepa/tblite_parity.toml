# Synth GEPA against the same live TBLite container used by the gepa-ai adapter.

[run]
run_id = "tblite_parity_synth_gepa"
output_dir = "../../runs/synth_gepa"
seed = 0

[container]
url = "http://127.0.0.1:8811"
startup_timeout_seconds = 5

[dataset]
train_split = "train"
heldout_split = "test"
train_seeds = [0, 1, 2]
heldout_seeds = [100, 101]

[candidate]
target_modules = ["starting_prompt"]

[seed_candidate]
starting_prompt = "You are a Python coding agent. Implement the requested function so that all of its hidden tests pass. Output ONLY the function source code, no markdown fences, no surrounding prose, no example usage. Match the function signature exactly. Handle edge cases. Use the standard library."

[policy]
provider = "openai"
model = "gpt-4.1-nano"
api_key_env = "OPENAI_API_KEY"

[proposer]
backend = "codex_app_server"
execution_mode = "local_process"
timeout_seconds = 900
model = "gpt-5.3-codex-spark"
reasoning_effort = "medium"
copy_host_auth = true
api_key_env = "OPENAI_API_KEY"
sandbox_mode = "workspace-write"
approval_policy = "never"

[gepa]
max_generations = 1
proposals_per_generation = 1
minibatch_size = 3
max_total_rollouts = 16
max_cost_usd = 0.0

[cache]
mode = "off"
path = "../../runs/synth_gepa/tblite_parity_cache.sqlite"
namespace = "tblite_parity"
