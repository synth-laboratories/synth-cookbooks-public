[profile]
name = "smoke"
description = "Tiny TBLite GEPA run for checking container startup, API-key auth, and pytest rollout plumbing."

[base]
config = "gepa.toml"
run_id = "tblite_gepa_public"

[policy]
provider = "openai"
model = "gpt-4.1-nano"
api_key_env = "OPENAI_API_KEY"

[proposer]
model = "gpt-5.4-nano"
auth_mode = "api_key"
api_key_env = "OPENAI_API_KEY"
copy_host_auth = false

[task]
test_timeout_seconds = 30

[dataset]
train_size = 3
heldout_size = 2
train_seed_start = 0
heldout_seed_start = 100

[pipeline]
max_generations = 1
proposals_per_generation = 1
minibatch_size = 3
max_in_flight_candidates = 1
rollout_workers = 6
rollout_chunk_size = "auto"

[pipeline.adaptive_rollout_concurrency]
enabled = true
initial = 6
min = 1
max = 12
increase_step = 3
decrease_step = 3
increase_after_successes = 10

[budgets]
train_rollouts = 16
heldout_rollouts = 4

[timeouts]
container_http_seconds = 90
rollout_http_retries = 0
