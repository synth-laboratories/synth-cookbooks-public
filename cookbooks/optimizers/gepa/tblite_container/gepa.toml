[run]
run_id = "tblite_gepa_public"
output_dir = "../runs"
seed = 0

[container]
url = "http://127.0.0.1:8766"
command = [
  "uv", "run", "--project", "tblite_container",
  "python", "tblite_container/synth_service_app.py",
  "--host", "127.0.0.1", "--port", "8766",
]
cwd = ".."
startup_timeout_seconds = 60

[dataset]
train_split = "train"
heldout_split = "test"
train_seeds = [0, 1, 2]
heldout_seeds = [100, 101]

[candidate]
target_modules = ["starting_prompt"]

[seed_candidate]
starting_prompt = "You are a Python coding agent. Implement the requested function so that all of its hidden tests pass. Output ONLY the function source code, no markdown fences, no surrounding prose, no example usage. Match the function signature exactly. Handle edge cases. Use the standard library."

[policy]
provider = "openai"
model = "gpt-4.1-nano"
api_key_env = "OPENAI_API_KEY"

[proposer]
backend = "local_process_json"
execution_mode = "local_process"
command = [
  "uv", "run", "--quiet", "--with", "openai>=1.0", "python3",
  "cookbooks/optimizers/gepa/_proposers/openai_api/proposer.py",
]
timeout_seconds = 300
model = "gpt-4.1-mini"
reasoning_effort = ""

[gepa]
max_generations = 1
proposals_per_generation = 1
minibatch_size = 3
max_total_rollouts = 16
max_cost_usd = 0.0

[cache]
mode = "readwrite"
path = "../runs/tblite_gepa_cache.sqlite"
namespace = "tblite_gepa_public_live"
