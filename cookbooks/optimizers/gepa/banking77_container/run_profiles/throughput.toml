[profile]
name = "throughput"
description = "Single-proposal Banking77 profile for measuring adaptive rollout throughput."

[base]
config = "gepa.toml"
run_id = "banking77_gepa_async_t50_mb20_h100"

[policy]
provider = "openrouter"
model = "qwen/qwen-2.5-7b-instruct"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
api_mode = "auto"
concurrency = 120
retries = 1
max_tokens = 16
disable_reasoning = "auto"

[proposer]
model = "gpt-5.4-nano"
auth_mode = "api_key"
api_key_env = "OPENAI_API_KEY"
copy_host_auth = false

[dataset]
train_size = 100
heldout_size = 20
train_shuffle_seed = "random"
heldout_shuffle_seed = "random"

[pipeline]
max_generations = 1
proposals_per_generation = 1
minibatch_size = 40
max_in_flight_candidates = 1
rollout_workers = 20
rollout_chunk_size = "auto"

[pipeline.adaptive_rollout_concurrency]
enabled = true
initial = 50
min = 1
max = 120
increase_step = 10
decrease_step = 10
increase_after_successes = 40

[budgets]
train_rollouts = 260
heldout_rollouts = 40

[timeouts]
policy_seconds = 20
rollout_seconds = 25
container_http_seconds = 30
rollout_http_retries = 0
