[run]
run_id = "crafter_gepa_public"
output_dir = "../runs"
seed = 0

[container]
url = "http://127.0.0.1:8768"
# Container's deps are declared per-container in this folder's pyproject.toml
# (craftax, jax[cpu], openai, fastapi, uvicorn). Boot it via uv against this
# directory so a user only installs Crafter-side deps when they run Crafter.
command = [
  "/usr/bin/env",
  "CRAFTER_POLICY_MODEL=gpt-4.1-nano",
  "CRAFTER_MAX_TURNS=20",
  "CRAFTER_MIN_BATCH=1",
  "CRAFTER_MAX_BATCH=5",
  "uv", "run", "--project", "crafter_container",
  "python", "crafter_container/synth_service_app.py",
  "--host", "127.0.0.1", "--port", "8768",
]
cwd = ".."
startup_timeout_seconds = 60

[dataset]
train_split = "train"
heldout_split = "test"
# Keep budgets small by default — real Craftax episodes (each ~20 turns of
# OpenAI calls) cost real money. Scale up after a first cookbook run.
train_seeds = [11, 13]
heldout_seeds = [101]

[candidate]
target_modules = ["react_system_prompt"]

[seed_candidate]
react_system_prompt = "You are a Crafter agent. Respond with <tool_call>{\"name\":\"crafter_interact\",\"arguments\":{\"actions_list\":[\"<action>\"]}}</tool_call>. Pick reasonable actions."

[policy]
# Live OpenAI policy. The container reads OPENAI_API_KEY from its env.
# Override the model via CRAFTER_POLICY_MODEL.
provider = "openai"
model = "gpt-4.1-nano"
api_key_env = "OPENAI_API_KEY"

[proposer]
backend = "codex_app_server"
execution_mode = "local_process"
timeout_seconds = 900
model = "gpt-5.4-nano"
reasoning_effort = "medium"
auth_mode = "api_key"
copy_host_auth = false
api_key_env = "OPENAI_API_KEY"
sandbox_mode = "workspace-write"
approval_policy = "never"

[gepa]
max_generations = 1
proposals_per_generation = 1
minibatch_size = 2
max_total_rollouts = 8
max_cost_usd = 0.0

[gepa.pipeline]
mode = "async_pipelined"
max_in_flight_candidates = 1

[gepa.pipeline.workers]
rollout = 10

[gepa.pipeline.adaptive_rollout_concurrency]
enabled = true
initial = 10
min = 1
max = 30
increase_step = 5
decrease_step = 5
increase_after_successes = 20

[cache]
mode = "readwrite"
path = "../runs/crafter_gepa_cache.sqlite"
namespace = "crafter_gepa_public_live"
