[profile]
name = "throughput"
description = "Crafter throughput/debug profile with one proposal and enough rows to exercise rollout concurrency."

[base]
config = "gepa.toml"
run_id = "crafter_gepa_public_throughput"

[policy]
provider = "openai"
model = "gpt-4.1-nano"
api_key_env = "OPENAI_API_KEY"

[proposer]
model = "gpt-5.4-nano"
auth_mode = "api_key"
api_key_env = "OPENAI_API_KEY"
copy_host_auth = false

[task]
max_turns = 8
min_batch = 1
max_batch = 5

[dataset]
train_size = 20
heldout_size = 10
train_seed_start = "random"
heldout_seed_start = "random"

[pipeline]
max_generations = 1
proposals_per_generation = 1
minibatch_size = 10
max_in_flight_candidates = 1
rollout_workers = 8
rollout_chunk_size = "auto"

[pipeline.adaptive_rollout_concurrency]
enabled = true
initial = 8
min = 1
max = 24
increase_step = 4
decrease_step = 4
increase_after_successes = 30

[budgets]
train_rollouts = 80
heldout_rollouts = 20

[timeouts]
container_http_seconds = 300
rollout_async_seconds = 300
rollout_http_retries = 0
