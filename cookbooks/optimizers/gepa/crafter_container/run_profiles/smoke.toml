[profile]
name = "smoke"
description = "Tiny Crafter GEPA run for checking container startup, API-key auth, and Craftax rollout plumbing."

[base]
config = "gepa.toml"
run_id = "crafter_gepa_public"

[policy]
provider = "gemini"
model = "gemini-3.1-flash-lite"
api_key_env = "GEMINI_API_KEY"

[proposer]
model = "gpt-5.4-nano"
auth_mode = "api_key"
api_key_env = "OPENAI_API_KEY"
copy_host_auth = false

[task]
max_turns = 20
min_batch = 1
max_batch = 5

[dataset]
train_size = 2
heldout_size = 1
train_seed_start = 11
heldout_seed_start = 101

[pipeline]
max_generations = 1
proposals_per_generation = 1
minibatch_size = 2
max_in_flight_candidates = 1
rollout_workers = 4
rollout_chunk_size = "auto"

[pipeline.adaptive_rollout_concurrency]
enabled = true
initial = 4
min = 1
max = 8
increase_step = 2
decrease_step = 2
increase_after_successes = 10

[budgets]
train_rollouts = 8
heldout_rollouts = 2

[timeouts]
container_http_seconds = 120
rollout_async_seconds = 120
rollout_http_retries = 0
