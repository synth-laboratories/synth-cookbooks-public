[profile]
name = "long"
description = "Longer Crafter GEPA run intended to improve live survival-agent prompt behavior."

[base]
config = "gepa.toml"
run_id = "crafter_gepa_public"

[policy]
provider = "openai"
model = "gpt-4.1-nano"
api_key_env = "OPENAI_API_KEY"

[proposer]
model = "gpt-5.4-nano"
auth_mode = "api_key"
api_key_env = "OPENAI_API_KEY"
copy_host_auth = false

[task]
max_turns = 12
min_batch = 1
max_batch = 5

[dataset]
train_size = 30
heldout_size = 30
train_seed_start = "random"
heldout_seed_start = "random"

[pipeline]
max_generations = 2
proposals_per_generation = 4
minibatch_size = 10
max_in_flight_candidates = 4
rollout_workers = 8
rollout_chunk_size = "auto"

[pipeline.adaptive_rollout_concurrency]
enabled = true
initial = 8
min = 1
max = 24
increase_step = 4
decrease_step = 4
increase_after_successes = 30

[budgets]
train_rollouts = 280
heldout_rollouts = 60

[timeouts]
container_http_seconds = 900
rollout_async_seconds = 900
rollout_http_retries = 0
