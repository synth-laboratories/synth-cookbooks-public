[candidate]
target_modules = ["stage2_system"]

[seed_candidate]
stage2_system = "Classify the customer banking query into exactly one Banking77 intent. Return exactly one label from the allowed label list, preserving spelling, underscores, capitalization, and punctuation. Use the full query, not one keyword. Return only the label."

[policy]
provider = "openrouter"
model = "meta-llama/llama-3.2-3b-instruct"
api_key_env = "OPENROUTER_API_KEY"

[proposer]
backend = "codex_app_server"
execution_mode = "local_process"
timeout_seconds = 900
model = "gpt-5.4-mini"
reasoning_effort = "medium"
auth_mode = "api_key"
copy_host_auth = false
api_key_env = "OPENAI_API_KEY"
sandbox_mode = "workspace-write"
approval_policy = "never"

[gepa]
max_generations = 3
proposals_per_generation = 4
minibatch_size = 50
max_train_rollouts = 6000
max_heldout_rollouts = 3500
max_cost_usd = 0.0
rollout_async_timeout_seconds = 300

[gepa.pipeline]
mode = "async_pipelined"
max_in_flight_candidates = 4

[gepa.pipeline.workers]
rollout = 20

[gepa.pipeline.adaptive_rollout_concurrency]
enabled = true
initial = 50
min = 10
max = 120
increase_step = 10
decrease_step = 10
increase_after_successes = 40

[cache]
mode = "readwrite"
path = "runs/banking77_sanity_cache.sqlite"
namespace = "banking77_sanity"

[disk_budget]
enabled = true
soft_limit_gb = 16
hard_limit_gb = 20
