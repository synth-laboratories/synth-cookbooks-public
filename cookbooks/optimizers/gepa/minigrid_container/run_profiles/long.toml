[profile]
name = "long"
description = "Longer MiniGrid GEPA run intended to produce meaningful agent-policy prompt movement."

[base]
config = "gepa.toml"
run_id = "minigrid_gepa_public"

[policy]
provider = "openai"
model = "gpt-4.1-nano"
api_key_env = "OPENAI_API_KEY"

[proposer]
model = "gpt-5.4-nano"
auth_mode = "api_key"
api_key_env = "OPENAI_API_KEY"
copy_host_auth = false

[task]
env_id = "MiniGrid-DoorKey-5x5-v0"
max_steps = 48

[dataset]
train_size = 30
heldout_size = 30
train_seed_start = "random"
heldout_seed_start = "random"

[pipeline]
max_generations = 2
proposals_per_generation = 4
minibatch_size = 10
max_in_flight_candidates = 4
rollout_workers = 20
rollout_chunk_size = "auto"

[pipeline.adaptive_rollout_concurrency]
enabled = true
initial = 20
min = 1
max = 60
increase_step = 10
decrease_step = 10
increase_after_successes = 30

[budgets]
train_rollouts = 280
heldout_rollouts = 60

[timeouts]
container_http_seconds = 120
rollout_http_retries = 0
