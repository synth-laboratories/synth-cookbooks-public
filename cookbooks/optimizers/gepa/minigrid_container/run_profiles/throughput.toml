[profile]
name = "throughput"
description = "MiniGrid throughput/debug profile with one proposal and enough rows to exercise rollout concurrency."

[base]
config = "gepa.toml"
run_id = "minigrid_gepa_public_throughput"

[policy]
provider = "openai"
model = "gpt-4.1-nano"
api_key_env = "OPENAI_API_KEY"

[proposer]
model = "gpt-5.4-nano"
auth_mode = "api_key"
api_key_env = "OPENAI_API_KEY"
copy_host_auth = false

[task]
env_id = "MiniGrid-DoorKey-5x5-v0"
max_steps = 48

[dataset]
train_size = 20
heldout_size = 10
train_seed_start = "random"
heldout_seed_start = "random"

[pipeline]
max_generations = 1
proposals_per_generation = 1
minibatch_size = 10
max_in_flight_candidates = 1
rollout_workers = 20
rollout_chunk_size = "auto"

[pipeline.adaptive_rollout_concurrency]
enabled = true
initial = 20
min = 1
max = 60
increase_step = 10
decrease_step = 10
increase_after_successes = 30

[budgets]
train_rollouts = 80
heldout_rollouts = 20

[timeouts]
container_http_seconds = 120
rollout_http_retries = 0
