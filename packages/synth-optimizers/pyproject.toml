[project]
name = "synth-optimizers"
version = "0.1.0a0"
description = "Public Synth optimizer tooling with a Rust GEPA core."
authors = [{name = "Synth Laboratories", email = "josh@usesynth.ai"}]
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = []

[project.optional-dependencies]
dev = [
    "maturin>=1.7.0",
    "ruff>=0.6.0",
    "ty>=0.0.32",
]

[dependency-groups]
dev = [
    "maturin>=1.7.0",
    "ruff>=0.6.0",
    "ty>=0.0.32",
]

[project.scripts]
synth-optimizers = "synth_optimizers.cli:main"

[project.urls]
Homepage = "https://github.com/synth-laboratories/synth-cookbooks-public/tree/main/packages/synth-optimizers"
Repository = "https://github.com/synth-laboratories/synth-cookbooks-public"
Issues = "https://github.com/synth-laboratories/synth-cookbooks-public/issues"

[build-system]
requires = ["maturin>=1.7.0"]
build-backend = "maturin"

[tool.maturin]
manifest-path = "rust/crates/synth_optimizers_py/Cargo.toml"
module-name = "synth_optimizers._synth_optimizers"
python-source = "src"

[tool.uv]
package = true

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]
