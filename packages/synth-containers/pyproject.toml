[project]
name = "synth-containers"
version = "0.1.0"
description = "Shared Synth container and environment runtime substrate"
authors = [{name = "Synth Laboratories", email = "josh@usesynth.ai"}]
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "pydantic>=2.0.0",
    "fastapi>=0.110.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[project.urls]
Homepage = "https://github.com/synth-laboratories/synth-cookbooks-public/tree/main/packages/synth-containers"
Repository = "https://github.com/synth-laboratories/synth-cookbooks-public"

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["synth_containers", "synth_containers.*"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
