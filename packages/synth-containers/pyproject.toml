[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "synth-containers"
version = "0.0.0"
description = "Public Synth container harnesses, service wrappers, and task adapters."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Synth" }]
dependencies = []

[tool.setuptools.packages.find]
where = ["src"]
