[project]
name = "synth-containers"
version = "0.1.0"
description = "Shared Synth container and environment runtime substrate"
authors = [{name = "Synth Laboratories", email = "josh@usesynth.ai"}]
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "pydantic>=2.0.0",
    "fastapi>=0.110.0",
    "httpx>=0.27.0",
    "uvicorn>=0.30.0",
]

[project.optional-dependencies]
dev = [
    "build>=1.2.1",
    "twine>=5.0.0",
    "ruff>=0.6.0",
    "ty>=0.0.32",
]

[dependency-groups]
dev = [
    "build>=1.2.1",
    "twine>=5.0.0",
    "ruff>=0.6.0",
    "ty>=0.0.32",
]

[project.urls]
Homepage = "https://github.com/synth-laboratories/synth-cookbooks-public/tree/main/packages/synth-containers"
Repository = "https://github.com/synth-laboratories/synth-cookbooks-public"
Issues = "https://github.com/synth-laboratories/synth-cookbooks-public/issues"

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.uv]
package = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["synth_containers", "synth_containers.*"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]
