name: Package build

on:
  pull_request:
    paths:
      - "packages/**"
      - ".github/workflows/package-build.yml"
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - ".github/workflows/package-build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - synth-containers
          - synth-optimizers

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Lint package
        working-directory: packages/${{ matrix.package }}
        run: uv run --group dev ruff check src

      - name: Type check package
        working-directory: packages/${{ matrix.package }}
        run: uv run --group dev ty check src

      - name: Build package
        working-directory: packages/${{ matrix.package }}
        run: uv build
